name: Update Cars Data

on:
  push:
    paths:
      - 'public/data/cars.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate and publish cars.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate cars.json
        run: |
          echo "Validating cars.json..."
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('public/data/cars.json', 'utf8'));
            if (!Array.isArray(data)) throw new Error('cars.json must be an array');
            data.forEach((c, i) => {
              if (!c.name || !c.image) throw new Error('Car at index ' + i + ' missing name or image');
            });
            console.log('Valid - ' + data.length + ' cars loaded');
          "

      - name: Publish cars data for GitHub Pages
        run: |
          mkdir -p data
          cp public/data/cars.json data/cars.json

      - name: Commit published cars data
        run: |
          if git diff --quiet -- data/cars.json; then
            echo "data/cars.json already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cars.json
          git commit -m "chore: publish cars data"
          git pull origin master --rebase
          git push
